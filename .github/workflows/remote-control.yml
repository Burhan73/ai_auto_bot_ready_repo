name: AI Commander Pro
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Islem'
        type: choice
        required: true
        default: 'notify'
        options:
          - notify
          - lock
          - list_files
          - speak
          - screenshot
          - volume
          - music_play
          - empty_trash
      message:
        description: 'Mesaj'
        required: false
        default: 'Sistem aktif'

jobs:
  ai-operation:
    runs-on: self-hosted
    steps:
      - name: Komut Calistir
        run: |
          case "${{ github.event.inputs.command }}" in
            "notify")
              osascript -e "display notification \"${{ github.event.inputs.message }}\" with title \"AI Commander\""
              ;;
            "lock")
              pmset displaysleepnow
              ;;
            "list_files")
              ls ~/Desktop
              ;;
            "speak")
              say "${{ github.event.inputs.message }}"
              ;;
            "screenshot")
              screencapture ~/Desktop/AI_Screen.png
              ;;
            "volume")
              osascript -e "set volume output volume 100"
              ;;
            "music_play")
              osascript -e "tell application \"Music\" to play next track"
              ;;
            "empty_trash")
              osascript -e "tell application \"Finder\" to empty trash"
              ;;
          esac
