name: AI Commander Pro
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Yapilacak Islem'
        type: choice
        required: true
        default: 'notify'
        options:
          - notify
          - lock
          - list_files
          - speak
      message:
        description: 'Mesajiniz'
        required: false
        default: 'Sistem aktif!'

jobs:
  ai-operation:
    runs-on: self-hosted
    steps:
      - name: Bildirim Gönder
        if: github.event.inputs.command == 'notify'
        run: osascript -e 'display notification "${{ github.event.inputs.message }}" with title "AI Commander"'

      - name: Ekranı Kilitle
        if: github.event.inputs.command == 'lock'
        run: pmset displaysleepnow

      - name: Dosyaları Listele
        if: github.event.inputs.command == 'list_files'
        run: ls ~/Desktop

      - name: Konuştur
        if: github.event.inputs.command == 'speak'
        run: say "${{ github.event.inputs.message }}"
