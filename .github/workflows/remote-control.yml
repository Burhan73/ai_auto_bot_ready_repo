name: AI Commander Pro
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Yapilacak Islem'
        type: choice
        required: true
        default: 'notify'
        options:
          - notify
          - lock
          - list_files
          - speak
      message:
        description: 'Mesajiniz'
        required: false
        default: 'Sistem aktif!'

jobs:
  ai-operation:
    runs-on: self-hosted
    steps:
      - name: Execute
        run: |
          CMD="${{ github.event.inputs.command }}"
          MSG="${{ github.event.inputs.message }}"
          
          if [ "$CMD" == "notify" ]; then
            osascript -e "display notification \"$MSG\" with title \"AI Commander\""
          elif [ "$CMD" == "lock" ]; then
            pmset displaysleepnow
          elif [ "$CMD" == "list_files" ]; then
            ls ~/Desktop
          elif [ "$CMD" == "speak" ]; then
            say "$MSG"
          fi
