name: AI Commander Pro
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Yapılacak İşlem'
        required: true
        default: 'notify'
        type: choice
        options:
          - notify
          - lock
          - list_files
          - speak
      message:
        description: 'Mesaj veya Gemini Sorusu'
        required: false
        default: 'Sistem aktif!'

jobs:
  ai-operation:
    runs-on: self-hosted
    steps:
      - name: Execute Super Powers
        run: |
          case "${{ github.event.inputs.command }}" in
            "notify")
              osascript -e 'display notification "${{ github.event.inputs.message }}" with title "AI Commander"'
              ;;
            "lock")
              echo "MacBook Kilitleniyor..."
              pmset displaysleepnow
              ;;
            "list_files")
              echo "Masaüstündeki Dosyalar:"
              ls ~/Desktop
              ;;
            "speak")
              say "${{ github.event.inputs.message }}"
              ;;
          esac
